# .github/workflows/virustotal-scan.yml

name: VirusTotal Scan

on:
  push:

permissions:
  contents: read
  issues: write

jobs:
  virustotal:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Scan all files with VirusTotal
        id: scan
        env:
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
        run: |
          MALWARE_FOUND=0
          REPORT=""

          find . -type f \
            ! -path "./.git/*" \
            ! -path "./.github/*" \
            | while read FILE; do

              SIZE=$(stat -c%s "$FILE")

              # VirusTotal 무료 API 업로드 제한 회피 (32MB)
              if [ "$SIZE" -gt 32000000 ]; then
                echo "Skipping large file: $FILE"
                continue
              fi

              echo "Scanning: $FILE"

              RESPONSE=$(curl -s --request POST \
                --url https://www.virustotal.com/api/v3/files \
                --header "x-apikey: $VT_API_KEY" \
                --form file=@"$FILE")

              # 업로드 실패 대응
              if ! echo "$RESPONSE" | jq . >/dev/null 2>&1; then
                echo "Invalid response for $FILE"
                continue
              fi

              ANALYSIS_ID=$(echo "$RESPONSE" | jq -r '.data.id')

              if [ "$ANALYSIS_ID" = "null" ] || [ -z "$ANALYSIS_ID" ]; then
                echo "Upload failed: $FILE"
                continue
              fi

              sleep 15

              RESULT=$(curl -s --request GET \
                --url https://www.virustotal.com/api/v3/analyses/$ANALYSIS_ID \
                --header "x-apikey: $VT_API_KEY")

              if ! echo "$RESULT" | jq . >/dev/null 2>&1; then
                echo "Invalid analysis result for $FILE"
                continue
              fi

              MALICIOUS=$(echo "$RESULT" | jq '.data.attributes.stats.malicious')

              echo "$FILE => malicious: $MALICIOUS"

              if [ "$MALICIOUS" -gt 0 ]; then
                MALWARE_FOUND=1
                REPORT="${REPORT}\n- ${FILE} : ${MALICIOUS} detections"
              fi

            done

          echo "malware_found=$MALWARE_FOUND" >> $GITHUB_OUTPUT

          {
            echo 'report<<EOF'
            echo -e "$REPORT"
            echo EOF
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Issue
        if: steps.scan.outputs.malware_found == '1'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "⚠️ VirusTotal detected suspicious files",
              body: `
              VirusTotal found suspicious files.

              Commit:
              ${context.sha}

              Findings:
              ${{ steps.scan.outputs.report }}

              Workflow Run:
              https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}
              `
            })