name: Bug Issue Automation

on:
  issues:
    types: [opened]

jobs:
  # 1. 이슈가 버그 관련인지 확인하는 Job
  check-bug:
    runs-on: ubuntu-latest
    outputs:
      is_bug: ${{ steps.check.outputs.is_bug }}
    steps:
      - id: check
        run: |
          if [[ "${{ github.event.issue.title }}" =~ "bug" ]] || [[ "${{ toJson(github.event.issue.labels.*.name) }}" =~ "bug" ]]; then
            echo "is_bug=true" >> $GITHUB_OUTPUT
          else
            echo "is_bug=false" >> $GITHUB_OUTPUT
          fi

  # 2. 리뷰어(담당자)를 지정하는 Job
  assign-reviewers:
    needs: check-bug
    if: needs.check-bug.outputs.is_bug == 'true'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Assign reviewers
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              assignees: ['danidevlab', 'Pandadevlab']
            })

  # 3. 코멘트를 작성하는 Job
  create-comment:
    needs: check-bug
    if: needs.check-bug.outputs.is_bug == 'true'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '🐛 새로운 버그 이슈가 접수되었습니다! @danidevlab @Pandadevlab 확인 부탁드립니다.'
            })
