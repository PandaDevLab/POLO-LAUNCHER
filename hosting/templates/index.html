<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>POLO Luncher Booting</title>
<style>
    body {
        background-color: #1a1a1a;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        color: #eee;
        font-family: Arial, sans-serif;
    }

    .boot-container {
        text-align: center;
    }

    .progress-bar {
        width: 300px;
        height: 10px;
        background-color: #333;
        border-radius: 5px;
        overflow: hidden;
        margin-top: 10px;
    }

    .progress-fill {
        height: 100%;
        background-color: #2ecc71;
        width: 0%;
        animation: load 5s forwards; /* 5초 동안 로딩 */
    }

    @keyframes load {
        0% { width: 0%; }
        100% { width: 100%; }
    }
</style>
</head>
<body>
    <div class="boot-container">
        <h2>✨POLO LAUNCHER✨</h2>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
    </div>
    <script>
            //대충 5초 걸리고 바 끝남. 그러니까 5초 뒤에 index.html로 리다이렉트
        setTimeout(function() {
            window.location.href = './os-luncher/luncher.html';
        }, 5000);
        connect() {
            to = 'localhost:6767/index.html'
        }
    </script>
</body>
</html>
