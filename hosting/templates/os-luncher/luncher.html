<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title></title>
    <style>
        body{
margin:0;
height:100vh;
}

/* 태스크바 */

#taskbar{
position:fixed;
bottom:0;
left:0;

width:100%;
height:50px;

background:#2563eb; /* 파란색 */

color:white;
display:flex;
align-items:center;
padding-left:10px;
padding-right:10px;
font-family:sans-serif;
gap:5px;
}

.taskbar-app{
width:45px;
height:45px;
background:rgba(255,255,255,0.2);
border:none;
border-radius:5px;
color:white;
font-size:20px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
transition:all 0.2s;
}

.taskbar-app:hover{
background:rgba(255,255,255,0.4);
transform:scale(1.1);
}

/* 파일 영역 */

#desktop-files{
padding:20px;
margin-bottom:60px;
}
    </style>
</head>

<body>
    <div id="desktop-files">Quick GOTOs(<-이거가 바로 바로가기 같은거임)</div>
    <div id="taskbar">
        <button class="taskbar-app" title="파일 관리자">📁</button>
        <button class="taskbar-app" title="브라우저">🌐</button>
        <button class="taskbar-app" title="설정">⚙️</button>
        <button class="taskbar-app" title="계산기">🔢</button>
        <button class="taskbar-app" title="터미널">💻</button>
        <button class="taskbar-app" title="메모">📝</button>
        <button class="taskbar-app" title="음악 플레이어">🎵</button>
        <button class="taskbar-app" title="이미지 뷰어">🖼️</button>
    </div>
    <script>
        // 근데 이거는 왜넣음?

        // 태스크바 앱 버튼 클릭 이벤트
        const apps = {
            '📁': { name: '파일 관리자', action: () => alert('파일 관리자 열기') },
            '🌐': { name: '브라우저', action: () => alert('웹 브라우저 열기') },
            '⚙️': { name: '설정', action: () => alert('설정 열기') },
            '🔢': { name: '계산기', action: () => alert('계산기 열기') },
            '💻': { name: '터미널', action: () => alert('터미널 열기') },
            '📝': { name: '메모', action: () => alert('메모장 열기') },
            '🎵': { name: '음악 플레이어', action: () => alert('음악 플레이어 열기') },
            '🖼️': { name: '이미지 뷰어', action: () => alert('이미지 뷰어 열기') }
        };
const app_links = {
  '디데이': './apps/d-day.html',
  '타이머': './apps/timer.html',
  '주사위 던지기': './apps/dice.html',
  '랜덤 선택': './apps/random.html',
  '돌림판': './apps/circlepan.html',
  '점수판': './apps/scoreboard.html',
  '메모지': './apps/memo.html',
  '소음 측정기': './apps/소음측정기.html',
  '브라우저': './apps/browser.html',
  'QR 코드 생성기': './apps/qrcodemaker.html',
  '실시간 시계': './apps/livetime.html',
  '체크리스트': './apps/checklist.html'
};

        document.querySelectorAll('.taskbar-app').forEach(button => {
            button.addEventListener('click', () => {
                const emoji = button.textContent;
                if (apps[emoji]) {
                    apps[emoji].action();
                }
            });
        });
    </script>
</body>

</html>
