<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POLO LAUNCHER Setting</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#0d1117;
    overflow:hidden;
    color:white;
}

.slider{
    display:flex;
    width:400%;
    height:100vh;
    transition:transform .5s ease;
}

.slide{
    width:100vw;
    height:100vh;
    flex-shrink:0;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:40px;
}

.slide h1{
    font-size:56px;
    margin-bottom:20px;
}

.slide p{
    max-width:600px;
    color:#9aa4b2;
    font-size:20px;
    line-height:1.7;
}

.icon{
    font-size:90px;
    margin-bottom:30px;
}

.slide:nth-child(1){
    background:linear-gradient(
        135deg,
        #10151d,
        #161d2b
    );
}

.slide:nth-child(2){
    background:linear-gradient(
        135deg,
        #121826,
        #1b2440
    );
}

.slide:nth-child(3){
    background:linear-gradient(
        135deg,
        #13141f,
        #25283a
    );
}

.slide:nth-child(4){
    background:linear-gradient(
        135deg,
        #141722,
        #1d2e4f
    );
}

.controls{
    position:fixed;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;
}

.dot{
    width:12px;
    height:12px;
    border-radius:50%;
    background:#4b5563;
    cursor:pointer;
    transition:.3s;
}

.dot.active{
    background:#4f8cff;
    width:30px;
    border-radius:999px;
}

.buttons{
    position:fixed;
    bottom:30px;
    right:40px;
}

button{
    border:none;
    cursor:pointer;
    border-radius:12px;
    padding:14px 28px;
    font-size:16px;
}

.next{
    background:#4f8cff;
    color:white;
}

.start{
    display:none;
    background:#22c55e;
    color:white;
}
</style>
</head>
<body>

<div class="slider" id="slider">

    <section class="slide">
        <div class="icon">🙍</div>
        <h1>다크모드/화이트 모드</h1>
        <p>
            다크모드 또는 화이트 모드를 선택해주세요.
            <input type="radio" name="theme" value="다크모드"> 다크모드
<input type="radio" name="theme" value="화이트모드"> 화이트모드
</p>
    </section>

    <section class="slide">
        <div class="icon">🤖</div>
        <h1>Ai 설정</h1>
        <p>
            ai 기능을 사용하시겠습니까?
<input type="radio" name="ai" value="사용"> Ai 기능 사용
<input type="radio" name="ai" value="사용안함"> Ai 기능 사용 안함

        </p>
    </section>

    <section class="slide">
        <div class="icon">⚡</div>
        <h1>업데이트</h1>
        <p>
            업데이트를 확인하고 있습니다...
        </p>
    </section>

    <section class="slide">
        <div class="icon">🚀</div>
        <h1>완료되었습니다!</h1>
        <p>
            지금 바로 시작해 볼까요?
        </p>
    </section>

</div>

<div class="controls">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
</div>

<div class="buttons">
    <button class="next" id="nextBtn">
        Next →
    </button>

    <button class="start" id="startBtn">
        시작하기 ➡️
    </button>
</div>

<script>
const slider = document.getElementById("slider");
const dots = document.querySelectorAll(".dot");

const nextBtn = document.getElementById("nextBtn");
const startBtn = document.getElementById("startBtn");

let current = 0;

function updateSlider() {

    slider.style.transform =
        `translateX(-${current * 100}vw)`;

    dots.forEach((dot,index)=>{
        dot.classList.toggle(
            "active",
            index === current
        );
    });

    if(current === 3){
        nextBtn.style.display = "none";
        startBtn.style.display = "inline-block";
    }else{
        nextBtn.style.display = "inline-block";
        startBtn.style.display = "none";
    }
}

nextBtn.addEventListener("click",()=>{
    if(current < 3){
        current++;
        updateSlider();
    }
});

dots.forEach((dot,index)=>{
    dot.addEventListener("click",()=>{
        current = index;
        updateSlider();
    });
});

startBtn.addEventListener("click",()=>{
    window.location.href = "../os-luncher/luncher.html";
});
</script>

</body>
</html>
